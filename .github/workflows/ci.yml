name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pyright pytest pytest-asyncio
        pip install "git+https://github.com/FishRaposo/operator-shared-core.git#egg=shared-core[docparse,embeddings]"
        pip install -e ".[dev]"

    - name: Lint with Ruff
      run: ruff check src/doc_pipeline tests examples

    - name: Format Check with Ruff
      run: ruff format --check src/doc_pipeline tests examples

    - name: Run Tests
      run: pytest
